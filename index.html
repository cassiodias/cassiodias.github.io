<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REKALL - Get Your Brain to Mars</title>
  <meta name="description" content="REKALL - Semantic retrieval and memory for your LLM. Coming soon.">
  <meta property="og:title" content="REKALL - Get Your Brain to Mars">
  <meta property="og:description" content="Semantic retrieval and memory for your LLM.">
  <meta property="og:image" content="https://cassiodias.github.io/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cassiodias.github.io">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(200, 60, 50, 0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    .logo {
      width: clamp(180px, 28vw, 280px);
      height: auto;
      margin-bottom: 2.5rem;
      animation: logoAppear 3s ease-out forwards, logoBreathe 6s ease-in-out 3s infinite;
      opacity: 0;
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 0.3em;
      text-shadow: 0 0 80px rgba(200, 60, 50, 0.15);
      animation: fadeInUp 2s ease-out 1s forwards;
      opacity: 0;
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: #888;
      letter-spacing: 0.08em;
      font-style: italic;
      margin-bottom: 2.5rem;
      animation: fadeInUp 2s ease-out 1.5s forwards;
      opacity: 0;
    }

    .description {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: #999;
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 3.5rem;
      animation: fadeInUp 2s ease-out 2s forwards;
      opacity: 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #333, transparent);
      margin: 0 auto 2.5rem;
      animation: fadeInUp 2s ease-out 1.8s forwards;
      opacity: 0;
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
      animation: fadeInUp 2s ease-out 2.5s forwards;
      opacity: 0;
    }

    .status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #c83c32;
      border-radius: 50%;
      margin-right: 10px;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.1em;
      animation: fadeInUp 2s ease-out 3s forwards;
      opacity: 0;
    }

    @keyframes logoAppear {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.9);
        filter: drop-shadow(0 0 0px rgba(200, 60, 50, 0));
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 0 30px rgba(200, 60, 50, 0.25));
      }
    }

    @keyframes logoBreathe {
      0%, 100% {
        opacity: 0.8;
        filter: drop-shadow(0 0 15px rgba(200, 60, 50, 0.1));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 0 50px rgba(200, 60, 50, 0.35));
      }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px rgba(200, 60, 50, 0.3); }
      50% { opacity: 1; box-shadow: 0 0 12px rgba(200, 60, 50, 0.6); }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <img src="brain.png" alt="REKALL" class="logo">

    <h1 class="title">Rekall</h1>
    <p class="tagline">"Get your brain to Mars"</p>
    <div class="divider"></div>
    <p class="description">
      Semantic retrieval and memory for your LLM.
    </p>
    <span class="status">Coming soon</span>
  </div>
  <div class="footer">cassiodias</div>
</body>
</html>
