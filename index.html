<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REKALL - Get Your Brain to Mars</title>
  <meta name="description" content="REKALL - Semantic retrieval and memory for your LLM. Coming soon.">
  <meta property="og:title" content="REKALL - Get Your Brain to Mars">
  <meta property="og:description" content="Semantic retrieval and memory for your LLM.">
  <meta property="og:image" content="https://cassiodias.github.io/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cassiodias.github.io">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(200, 60, 50, 0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    .logo-svg {
      width: clamp(180px, 28vw, 280px);
      height: auto;
      margin-bottom: 2.5rem;
      animation: logoAppear 3s ease-out forwards, logoBreathe 6s ease-in-out 3s infinite;
      opacity: 0;
    }

    .title {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 0.3em;
      text-shadow: 0 0 80px rgba(200, 60, 50, 0.15);
      animation: fadeInUp 2s ease-out 1s forwards;
      opacity: 0;
    }

    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: #888;
      letter-spacing: 0.08em;
      font-style: italic;
      margin-bottom: 2.5rem;
      animation: fadeInUp 2s ease-out 1.5s forwards;
      opacity: 0;
    }

    .description {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: #999;
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 3.5rem;
      animation: fadeInUp 2s ease-out 2s forwards;
      opacity: 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #333, transparent);
      margin: 0 auto 2.5rem;
      animation: fadeInUp 2s ease-out 1.8s forwards;
      opacity: 0;
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
      animation: fadeInUp 2s ease-out 2.5s forwards;
      opacity: 0;
    }

    .status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #c83c32;
      border-radius: 50%;
      margin-right: 10px;
      vertical-align: middle;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .footer {
      position: absolute;
      bottom: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.1em;
      animation: fadeInUp 2s ease-out 3s forwards;
      opacity: 0;
    }

    @keyframes logoAppear {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.9);
        filter: drop-shadow(0 0 0px rgba(200, 60, 50, 0));
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 0 30px rgba(200, 60, 50, 0.25));
      }
    }

    @keyframes logoBreathe {
      0%, 100% {
        opacity: 0.8;
        filter: drop-shadow(0 0 15px rgba(200, 60, 50, 0.1));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 0 50px rgba(200, 60, 50, 0.35));
      }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; box-shadow: 0 0 4px rgba(200, 60, 50, 0.3); }
      50% { opacity: 1; box-shadow: 0 0 12px rgba(200, 60, 50, 0.6); }
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Brain + Triangle + Circuit paths (inline SVG) -->
    <svg class="logo-svg" viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#e04040"/>
          <stop offset="100%" stop-color="#8b1a1a"/>
        </linearGradient>
        <linearGradient id="redGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#c83c32"/>
          <stop offset="100%" stop-color="#6b1515"/>
        </linearGradient>
      </defs>

      <!-- Circuit board paths (behind everything) -->
      <g stroke="#1a1a1a" stroke-width="1.2" fill="none" opacity="0.6">
        <!-- Top circuit lines -->
        <line x1="150" y1="20" x2="150" y2="45"/>
        <line x1="150" y1="20" x2="130" y2="8"/>
        <line x1="150" y1="20" x2="170" y2="8"/>
        <circle cx="130" cy="8" r="2" fill="#1a1a1a"/>
        <circle cx="170" cy="8" r="2" fill="#1a1a1a"/>

        <!-- Left circuit lines -->
        <line x1="42" y1="270" x2="20" y2="270"/>
        <line x1="20" y1="270" x2="20" y2="250"/>
        <line x1="20" y1="270" x2="8" y2="285"/>
        <circle cx="20" cy="250" r="2" fill="#1a1a1a"/>
        <circle cx="8" cy="285" r="2" fill="#1a1a1a"/>
        <line x1="60" y1="240" x2="35" y2="225"/>
        <line x1="35" y1="225" x2="15" y2="225"/>
        <circle cx="15" cy="225" r="2" fill="#1a1a1a"/>

        <!-- Right circuit lines -->
        <line x1="258" y1="270" x2="280" y2="270"/>
        <line x1="280" y1="270" x2="280" y2="250"/>
        <line x1="280" y1="270" x2="292" y2="285"/>
        <circle cx="280" cy="250" r="2" fill="#1a1a1a"/>
        <circle cx="292" cy="285" r="2" fill="#1a1a1a"/>
        <line x1="240" y1="240" x2="265" y2="225"/>
        <line x1="265" y1="225" x2="285" y2="225"/>
        <circle cx="285" cy="225" r="2" fill="#1a1a1a"/>

        <!-- Bottom circuit lines -->
        <line x1="120" y1="290" x2="120" y2="310"/>
        <line x1="120" y1="310" x2="100" y2="310"/>
        <circle cx="100" cy="310" r="2" fill="#1a1a1a"/>
        <line x1="180" y1="290" x2="180" y2="310"/>
        <line x1="180" y1="310" x2="200" y2="310"/>
        <circle cx="200" cy="310" r="2" fill="#1a1a1a"/>

        <!-- Extra circuit nodes -->
        <line x1="75" y1="155" x2="40" y2="155"/>
        <line x1="40" y1="155" x2="40" y2="175"/>
        <line x1="40" y1="175" x2="25" y2="190"/>
        <circle cx="25" cy="190" r="2" fill="#1a1a1a"/>

        <line x1="225" y1="155" x2="260" y2="155"/>
        <line x1="260" y1="155" x2="260" y2="175"/>
        <line x1="260" y1="175" x2="275" y2="190"/>
        <circle cx="275" cy="190" r="2" fill="#1a1a1a"/>
      </g>

      <!-- Triangle -->
      <polygon
        points="150,40 45,280 255,280"
        fill="none"
        stroke="url(#redGrad)"
        stroke-width="3.5"
        stroke-linejoin="round"
      />

      <!-- Brain - left hemisphere -->
      <g transform="translate(150, 165)" fill="none" stroke="url(#redGradLight)" stroke-width="2" stroke-linecap="round">
        <!-- Left outer -->
        <path d="M-4,-55 C-25,-55 -45,-45 -50,-25 C-55,-5 -50,5 -48,15 C-52,25 -55,35 -48,48 C-42,58 -30,65 -15,68 C-8,69 -4,68 -2,65"/>
        <!-- Left folds -->
        <path d="M-4,-45 C-18,-42 -30,-35 -35,-22"/>
        <path d="M-4,-30 C-20,-28 -38,-18 -42,-5"/>
        <path d="M-4,-15 C-15,-14 -35,-5 -40,8"/>
        <path d="M-4,0 C-18,2 -38,12 -40,25"/>
        <path d="M-4,15 C-15,17 -32,28 -35,40"/>
        <path d="M-4,35 C-12,38 -22,48 -25,55"/>
        <!-- Central line (left) -->
        <line x1="-4" y1="-55" x2="-4" y2="65"/>
      </g>

      <!-- Brain - right hemisphere -->
      <g transform="translate(150, 165)" fill="none" stroke="url(#redGradLight)" stroke-width="2" stroke-linecap="round">
        <!-- Right outer -->
        <path d="M4,-55 C25,-55 45,-45 50,-25 C55,-5 50,5 48,15 C52,25 55,35 48,48 C42,58 30,65 15,68 C8,69 4,68 2,65"/>
        <!-- Right folds -->
        <path d="M4,-45 C18,-42 30,-35 35,-22"/>
        <path d="M4,-30 C20,-28 38,-18 42,-5"/>
        <path d="M4,-15 C15,-14 35,-5 40,8"/>
        <path d="M4,0 C18,2 38,12 40,25"/>
        <path d="M4,15 C15,17 32,28 35,40"/>
        <path d="M4,35 C12,38 22,48 25,55"/>
        <!-- Central line (right) -->
        <line x1="4" y1="-55" x2="4" y2="65"/>
      </g>

      <!-- Brain stem -->
      <g transform="translate(150, 165)" fill="none" stroke="url(#redGradLight)" stroke-width="2" stroke-linecap="round">
        <path d="M-6,65 C-6,75 -4,82 0,85 C4,82 6,75 6,65"/>
      </g>
    </svg>

    <h1 class="title">Rekall</h1>
    <p class="tagline">"Get your brain to Mars"</p>
    <div class="divider"></div>
    <p class="description">
      Semantic retrieval and memory for your LLM.
    </p>
    <span class="status">Coming soon</span>
  </div>
  <div class="footer">cassiodias</div>
</body>
</html>
